<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Art Vault</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600&family=Oxanium:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />

    <script
      src="https://kit.fontawesome.com/3827e77d31.js"
      crossorigin="anonymous"
    ></script>

   <script src="browse.js" defer></script>
  </head>

  <body>

   
    <section class="browse__hero">


      <header>
        <nav>
          <div class="container nav__container">
            <div class="logo">
              <a href="index.html">
                <i class="fa-solid fa-paintbrush logo__icon"></i>
                <span class="logo__text">ArtVault</span>
              </a>
            </div>

            <ul class="nav__links">
              <li><a href="index.html" class="nav__link">Home</a></li>
              <li><a href="#" class="nav__link">Browse Collection</a></li>
              <li>
                <a href="#" class="nav__link nav__link--primary">Contact</a>
              </li>
            </ul>
          </div>
        </nav>
      </header>

      
      <div class="browse__hero-content">

        <h1 class="header__title">Browse Collection</h1>

        <div class="search">
          <div class="search__wrapper">

            <form class="search__form" action="/search" method="GET">
              <input
                type="text"
                class="search__input"
                id="site-search"
                name="q"
                placeholder="Search artist, object, medium, period..."
              />

              <span class="search__cursor"></span>

              <button class="search__button" type="submit">
                <i class="fa-solid fa-magnifying-glass"></i>
              </button>
            </form>

          </div>

          <p class="search__status">
            <span class="status__text">READY</span>
          </p>
        </div>

      </div>
    </section>
   


   
    <main>
      <section id="results">
        <div class="container"> 

<div class ="filter">
    <select id ="sort-select">
        <option value = "default">Sort Results</option>
        <option value = "title-asc">Title A-Z</option>
        <option value = "title-desc">Title Z-A</option>
        <option value = "date-new">Newest First</option>
        <option value = "date-old">Oldest First</option>
    </select>
</div>

            <div class="artworks">

            </div>

        </div>
      </section>

    </main>
    


  
    <footer id="footer">
      <div class="container">

        <div class="logo">
          <a href="index.html">
            <i class="fa-solid fa-paintbrush logo__icon"></i>
            <span class="logo__text">ArtVault</span>
          </a>
        </div>

        <div class="footer__list">
          <a href="#" class="footer__link">Home</a>
          <a href="#" class="footer__link no-cursor">Browse Collection</a>
          <a href="#" class="footer__link no-cursor">Contact</a>
        </div>

        <div class="footer__copyright">
          Copyright &copy; 2026 ArtVault
        </div>

      </div>
    </footer>

  </body>
</html>
